name: Keep Supabase awake

on:
  schedule:
    - cron: "17 14 * * 1,3,5"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render maintenance endpoint
        env:
          MAINTENANCE_TOKEN: ${{ secrets.MAINTENANCE_TOKEN }}
        run: |
          if [ -n "$MAINTENANCE_TOKEN" ]; then
            curl --fail --show-error --silent --retry 3 --retry-delay 20 \
              -H "x-maintenance-token: $MAINTENANCE_TOKEN" \
              "https://monkylovs.onrender.com/mantenimiento/keepalive"
          else
            curl --fail --show-error --silent --retry 3 --retry-delay 20 \
              "https://monkylovs.onrender.com/mantenimiento/keepalive"
          fi
